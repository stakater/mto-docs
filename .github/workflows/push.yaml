name: Push

on:
  push:
    branches:
      - 'main'
      - '[0-9]+.[0-9]+'

jobs:
  push:
    uses: stakater/.github/.github/workflows/push_versioned_doc.yaml@v0.0.189
    with:
      PRE_BUILD_HOOK: make merge
      LATEST_DOC_VERSION: "1.9"
    secrets:
      GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      PRE_BUILD_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
